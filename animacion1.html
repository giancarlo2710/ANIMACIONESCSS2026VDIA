<html>
<head>
    <title>ANIMACION 3 CSS</title>
    <style>
        *{
            padding: 0px;
            margin: 0px;
        }
        .contenedor{
            width: 400px;
            height: 200px;
            background-color: black;
            border: 1px solid  black;
            position: relative; /*para centrar el div*/
            margin: 0 auto; /*para centrar el div*/

            overflow: hidden;/*muestra solo lo interior*/
        }
  
        .cuadrito{
             width: 100px;
             height: 100px;
             background-color: black;
             position:absolute;/*permite mover el div dentro del contenedor*/
             left:-100px;
             top: 50px;
             
             animation: cuadrito 3s infinite ease-in; 
             
        }

        @keyframes cuadrito{
            from{
                left:-100px;
            }
            to{
                left:500px;
            }
        }

        .cuadrito img{
            width: 100px;
            height: 100px;
        
        }

    </style>
</head>
<body>
     <div class="contenedor">
          <div class= "cuadrito">
              <img src="img/megamanx.gif" alt="">
          </div>
        </div>
</body>
</html>
