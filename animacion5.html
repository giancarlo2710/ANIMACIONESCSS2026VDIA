<html>
<head>
    <title>Cohete animado</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        .contenedor{
            width: 400px;
            height: 200px;
            background: black;
            border: 1px solid white;
            position: relative;
            margin: 20px auto;
            overflow: hidden;
        }

        /* COHETE */
        .cohete{
            position: absolute;
            top: 60px;
            left: 150px;
            width: 80px;
            animation: coheteMove 3s infinite alternate;
        }

        .cohete img{
            width: 100px;
        }

        @keyframes coheteMove{
            from{
                rotate: -50deg;
            }
            to{
                rotate: 30deg;
            }
            
        }

        /* ESTRELLAS */
        .estrella{
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            animation: moverEstrellas linear infinite;
        }

        /* posiciones + velocidades */
        .e1{ top:10px; left:50px; animation-duration: 2s; }
        .e2{ top:30px; left:200px; animation-duration: 3s; }
        .e3{ top:80px; left:100px; animation-duration: 4s; }
        .e4{ top:150px; left:300px; animation-duration: 2.5s; }
        .e5{ top:60px; left:350px; animation-duration: 3.5s; }
        .e6{ top:120px; left:250px; animation-duration: 2.8s; }
        .e7{ top:40px; left:150px; animation-duration: 3.2s; }
        .e8{ top:170px; left:50px; animation-duration: 4.5s; }
        .e9{ top:90px; left:320px; animation-duration: 2.2s; }
        .e10{ top:20px; left:280px; animation-duration: 3.8s; }

        @keyframes moverEstrellas{
            from{
                transform: translateX(0);
            }
            to{
                transform: translateX(-450px);
            }
        }

    </style>
</head>
<body>

<div class="contenedor">

    <!-- ESTRELLAS -->
    <div class="estrella e1"></div>
    <div class="estrella e2"></div>
    <div class="estrella e3"></div>
    <div class="estrella e4"></div>
    <div class="estrella e5"></div>
    <div class="estrella e6"></div>
    <div class="estrella e7"></div>
    <div class="estrella e8"></div>
    <div class="estrella e9"></div>
    <div class="estrella e10"></div>

    <!-- COHETE -->
    <div class="cohete">
        <img src="img/cohete.png" alt="cohete">
    </div>

</div>

</body>
</html>
